openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Behavioral Home Operating System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: homes
    description: Home management
  - name: staff
    description: Staff management
  - name: patients
    description: Patient management
  - name: medications
    description: Medication tracking
  - name: incidents
    description: Incident reporting
  - name: daily-logs
    description: Daily patient logs
  - name: shifts
    description: Shift management
  - name: dashboard
    description: Dashboard and analytics
  - name: medication-safety
    description: Medication safety, eMAR, controlled substances, and compliance
  - name: billing
    description: Billing, claims, payers, and payment management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /homes:
    get:
      operationId: listHomes
      tags: [homes]
      summary: List all homes
      responses:
        "200":
          description: List of homes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Home"
    post:
      operationId: createHome
      tags: [homes]
      summary: Create a new home
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHomeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Home"

  /homes/{id}:
    get:
      operationId: getHome
      tags: [homes]
      summary: Get home by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Home details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Home"
        "404":
          description: Not found
    patch:
      operationId: updateHome
      tags: [homes]
      summary: Update home
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHomeBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Home"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff
      parameters:
        - name: homeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}:
    get:
      operationId: getStaffMember
      tags: [staff]
      summary: Get staff member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all patients
      parameters:
        - name: homeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /medications:
    get:
      operationId: listMedications
      tags: [medications]
      summary: List medications
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of medications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medication"
    post:
      operationId: createMedication
      tags: [medications]
      summary: Create medication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"

  /medication-administrations:
    get:
      operationId: listMedicationAdministrations
      tags: [medications]
      summary: List medication administrations
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
        - name: homeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of administrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicationAdministration"
    post:
      operationId: createMedicationAdministration
      tags: [medications]
      summary: Record medication administration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationAdministrationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationAdministration"

  /incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List incidents
      parameters:
        - name: homeId
          in: query
          required: false
          schema:
            type: integer
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [low, medium, high, critical]
      responses:
        "200":
          description: List of incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"
    post:
      operationId: createIncident
      tags: [incidents]
      summary: Report an incident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /incidents/{id}:
    get:
      operationId: getIncident
      tags: [incidents]
      summary: Get incident by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Incident details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "404":
          description: Not found
    patch:
      operationId: updateIncident
      tags: [incidents]
      summary: Update incident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIncidentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /daily-logs:
    get:
      operationId: listDailyLogs
      tags: [daily-logs]
      summary: List daily logs
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
        - name: homeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of daily logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyLog"
    post:
      operationId: createDailyLog
      tags: [daily-logs]
      summary: Create daily log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyLogBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLog"

  /shifts:
    get:
      operationId: listShifts
      tags: [shifts]
      summary: List shifts
      parameters:
        - name: homeId
          in: query
          required: false
          schema:
            type: integer
        - name: staffId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"
    post:
      operationId: createShift
      tags: [shifts]
      summary: Create shift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShiftBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /shifts/{id}:
    patch:
      operationId: updateShift
      tags: [shifts]
      summary: Update shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShiftBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /time-punches:
    get:
      operationId: listTimePunches
      tags: [time-punches]
      summary: List time punches
      parameters:
        - name: staffId
          in: query
          required: false
          schema:
            type: integer
        - name: homeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of time punches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimePunch"
    post:
      operationId: createTimePunch
      tags: [time-punches]
      summary: Clock in or clock out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimePunchBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimePunchResult"

  /time-punches/active:
    get:
      operationId: getActiveTimePunch
      tags: [time-punches]
      summary: Get the current active clock-in for a staff member
      parameters:
        - name: staffId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active time punch or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveTimePunchResponse"

  /fraud-alerts:
    get:
      operationId: listFraudAlerts
      tags: [fraud-alerts]
      summary: List fraud alerts
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, reviewed, dismissed]
        - name: staffId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of fraud alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FraudAlert"

  /fraud-alerts/{id}:
    patch:
      operationId: updateFraudAlert
      tags: [fraud-alerts]
      summary: Review or dismiss a fraud alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFraudAlertBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudAlert"

  /emar:
    get:
      operationId: getEmar
      tags: [medication-safety]
      summary: Get electronic medication administration record for today
      parameters:
        - name: homeId
          in: query
          required: false
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: eMAR schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmarEntry"

  /medication-counts:
    get:
      operationId: listMedicationCounts
      tags: [medication-safety]
      summary: List controlled substance count records
      parameters:
        - name: medicationId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicationCount"
    post:
      operationId: createMedicationCount
      tags: [medication-safety]
      summary: Record a controlled substance count
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationCountBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationCount"

  /medication-errors:
    get:
      operationId: listMedicationErrors
      tags: [medication-safety]
      summary: List medication error reports
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, resolved]
      responses:
        "200":
          description: List of errors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicationError"
    post:
      operationId: createMedicationError
      tags: [medication-safety]
      summary: Report a medication error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationErrorBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationError"

  /medication-errors/{id}/resolve:
    patch:
      operationId: resolveMedicationError
      tags: [medication-safety]
      summary: Resolve a medication error
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveMedicationErrorBody"
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationError"

  /medication-errors/auto-detect:
    post:
      operationId: runMedicationErrorAutoDetect
      tags: [medication-safety]
      summary: Scan eMAR records for automatic error detection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  format: date
      responses:
        "200":
          description: Auto-detected errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoDetectResult"

  /medication-inventory:
    get:
      operationId: listMedicationInventory
      tags: [medication-safety]
      summary: List medication inventory changes
      parameters:
        - name: medicationId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of inventory records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicationInventoryRecord"
    post:
      operationId: createMedicationInventoryChange
      tags: [medication-safety]
      summary: Record an inventory change
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationInventoryBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationInventoryRecord"

  /medication-inventory/refill-alerts:
    get:
      operationId: getRefillAlerts
      tags: [medication-safety]
      summary: Get medications needing refill
      responses:
        "200":
          description: Medications below refill threshold
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RefillAlert"

  /physician-orders:
    get:
      operationId: listPhysicianOrders
      tags: [medication-safety]
      summary: List physician orders
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, active, completed, discontinued]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhysicianOrder"
    post:
      operationId: createPhysicianOrder
      tags: [medication-safety]
      summary: Create a physician order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhysicianOrderBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhysicianOrder"

  /physician-orders/{id}:
    patch:
      operationId: updatePhysicianOrder
      tags: [medication-safety]
      summary: Update a physician order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePhysicianOrderBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhysicianOrder"

  /drug-interactions/check:
    get:
      operationId: checkDrugInteractions
      tags: [medication-safety]
      summary: Check for drug interactions for a patient
      parameters:
        - name: patientId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Drug interaction results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DrugInteraction"

  /dashboard/medication-safety:
    get:
      operationId: getMedicationSafetyDashboard
      tags: [medication-safety]
      summary: Get medication safety compliance dashboard
      responses:
        "200":
          description: Safety metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationSafetyDashboard"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard overview
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/medication-compliance:
    get:
      operationId: getMedicationCompliance
      tags: [dashboard]
      summary: Get medication compliance stats per home
      responses:
        "200":
          description: Medication compliance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicationComplianceItem"

  /dashboard/incident-trends:
    get:
      operationId: getIncidentTrends
      tags: [dashboard]
      summary: Get incident trends over time
      responses:
        "200":
          description: Incident trends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncidentTrendItem"

  /vital-signs:
    get:
      operationId: listVitalSigns
      tags: [medication-safety]
      summary: List vital signs records
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: administrationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Vital signs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VitalSigns"
    post:
      operationId: createVitalSigns
      tags: [medication-safety]
      summary: Record vital signs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVitalSignsBody"
      responses:
        "201":
          description: Vital signs recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VitalSigns"

  /medication-side-effects:
    get:
      operationId: listMedicationSideEffects
      tags: [medication-safety]
      summary: List medication side effects
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: medicationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Side effects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicationSideEffect"
    post:
      operationId: createMedicationSideEffect
      tags: [medication-safety]
      summary: Report a medication side effect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationSideEffectBody"
      responses:
        "201":
          description: Side effect reported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationSideEffect"

  /medication-refusals:
    get:
      operationId: listMedicationRefusals
      tags: [medication-safety]
      summary: List medication refusals
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Refusals list
          content:
            application/json:
              schema:
