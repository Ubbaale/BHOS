# Fix 405 on POST https://bhos.carehubapp.com/api/*
# Include inside the `server { ... }` block for bhos.carehubapp.com (static SPA host).
# Upstream must match your API deployment (Express serves /api/... on this host).

location /api/ {
    proxy_pass https://bhosapi.carehubapp.com/api/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host bhosapi.carehubapp.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
}
