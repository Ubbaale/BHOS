kind = "mobile"
previewPath = "/bhos-mobile/"
title = "BHOS Mobile"
version = "1.0.0"
id = "artifacts/bhos-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/bhos-mobile/" ]
localPort = 22811

[services.development]
run = "pnpm --filter @workspace/bhos-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bhos-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/bhos-mobile", "run", "serve" ]

[services.env]
PORT = "22811"
BASE_PATH = "/bhos-mobile/"
